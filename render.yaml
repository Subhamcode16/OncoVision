services:
  - type: web
    name: oncovision-backend
    env: python
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python src/server.py
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://oncovision-ai-ochre.vercel.app
      - key: ALLOWED_HOSTS
        value: .onrender.com,oncovision-backend.onrender.com,localhost,127.0.0.1
      - key: PORT
        value: 8000
